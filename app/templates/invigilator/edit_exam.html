<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Exam</title>
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <link rel="stylesheet" href="/static/css/admin.css">
    <link rel="stylesheet" href="/static/css/responsive.css">
</head>

<body>

    <div class="header">
        <h2>Edit Exam</h2>
        <a class="logout" href="/invigilator/dashboard">Back to Dashboard</a>
    </div>

    <div class="container">

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="card flash-box">
            {% for msg in messages %}
            <p style="margin: 4px 0;">{{ msg }}</p>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}

        <div class="card">
            <div class="section-title">Edit Exam Details</div>

            <form action="{{ url_for('invigilator_routes.edit_exam', exam_id=exam._id) }}" method="post" class="form-row">
                <div class="form-group">
                    <label>Exam Name *</label>
                    <input type="text" name="name" value="{{ exam.exam_name }}" required>
                </div>

                <div class="form-group">
                    <label>Duration (minutes) *</label>
                    <input type="number" name="duration" value="{{ exam.duration }}" required min="1">
                </div>

                <div class="form-group">
                    <label>&nbsp;</label>
                    <button class="btn btn-success">Update Exam</button>
                </div>
            </form>
        </div>

    </div>

</body>

</html>
